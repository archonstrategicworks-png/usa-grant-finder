<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USA Grant Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Find Your Grant</h1>
    </header>
    <main>
        <form id="grant-form">

        <section id="results"></section>
    </main>
    <footer>
        <p>&copy; 2026 USA Grant Finder</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
